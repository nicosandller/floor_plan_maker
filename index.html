<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floor Plan Maker</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
  <!-- Top Toolbar -->
  <div id="toolbar">
    <div class="toolbar-group">
      <button id="tool-select" class="tool-btn active" title="Select (V)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg>
        <span>Select</span>
      </button>
      <button id="tool-wall" class="tool-btn" title="Wall (W)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="8" width="20" height="8" rx="1"/></svg>
        <span>Wall</span>
      </button>
      <button id="tool-rect" class="tool-btn" title="Rectangle (R)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/></svg>
        <span>Rect</span>
      </button>
      <button id="tool-circle" class="tool-btn" title="Circle (C)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>
        <span>Circle</span>
      </button>
      <button id="tool-line" class="tool-btn" title="Line (L)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="20" y2="4"/></svg>
        <span>Line</span>
      </button>
      <button id="tool-text" class="tool-btn" title="Text (T)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"/></svg>
        <span>Text</span>
      </button>
      <button id="tool-window" class="tool-btn" title="Window on Wall (N)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="8" width="20" height="8"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="2" y1="11" x2="22" y2="11"/><line x1="2" y1="13" x2="22" y2="13"/></svg>
        <span>Win</span>
      </button>
      <button id="tool-dimension" class="tool-btn" title="Dimension (D)">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="8" x2="4" y2="16"/><line x1="20" y1="8" x2="20" y2="16"/></svg>
        <span>Dim</span>
      </button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-undo" class="action-btn" title="Undo (Ctrl+Z)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h10a5 5 0 0 1 0 10H13"/><polyline points="7 14 3 10 7 6"/></svg>
      </button>
      <button id="btn-redo" class="action-btn" title="Redo (Ctrl+Y)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10H11a5 5 0 0 0 0 10h1"/><polyline points="17 14 21 10 17 6"/></svg>
      </button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-zoom-in" class="action-btn" title="Zoom In">+</button>
      <span id="zoom-level">100%</span>
      <button id="btn-zoom-out" class="action-btn" title="Zoom Out">−</button>
      <button id="btn-zoom-fit" class="action-btn" title="Fit to Screen">Fit</button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-export-png" class="action-btn" title="Export PNG">PNG</button>
      <button id="btn-export-jpg" class="action-btn" title="Export JPG">JPG</button>
      <button id="btn-export-svg" class="action-btn" title="Export SVG">SVG</button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-save" class="action-btn" title="Save Project">Save</button>
      <button id="btn-load" class="action-btn" title="Load Project">Load</button>
      <input type="file" id="file-load" accept=".floorplan" style="display:none">
    </div>
  </div>

  <!-- Main Content -->
  <div id="main">
    <!-- Left Panel -->
    <div id="left-panel">
      <h3>Settings</h3>
      <div class="panel-section">
        <label>Scale (px/mm)</label>
        <input type="number" id="input-scale" value="0.15" step="0.01" min="0.01" max="1">
      </div>
      <div class="panel-section">
        <label>Grid (mm)</label>
        <input type="number" id="input-grid" value="100" step="50" min="10">
      </div>
      <div class="panel-section">
        <label>
          <input type="checkbox" id="input-snap" checked> Snap to grid
        </label>
      </div>
      <div class="panel-section wall-settings">
        <h4>Wall Settings</h4>
        <label>Thickness (mm)</label>
        <input type="number" id="input-wall-thickness" value="150" step="10" min="50" max="500">
        <label>Color</label>
        <input type="color" id="input-wall-color" value="#444444">
      </div>
      <div class="panel-section window-settings" style="display:none">
        <h4>Window Settings</h4>
        <label>Width (mm)</label>
        <input type="number" id="input-window-width" value="1000" step="50" min="200" max="3000">
        <p style="font-size:11px;color:var(--text-secondary);margin-top:4px">Click on a wall to place a window</p>
      </div>
      <div class="panel-section shape-settings" style="display:none">
        <h4>Shape Settings</h4>
        <label>Fill</label>
        <input type="color" id="input-shape-fill" value="#ffffff">
        <label>Stroke</label>
        <input type="color" id="input-shape-stroke" value="#cccccc">
        <label>Stroke Width</label>
        <input type="number" id="input-shape-stroke-width" value="1" step="0.5" min="0.5" max="10">
      </div>
    </div>

    <!-- Canvas Container -->
    <div id="canvas-container">
      <canvas id="floor-canvas"></canvas>
      <!-- Floating zoom controls on canvas -->
      <div id="canvas-zoom-controls">
        <button id="canvas-zoom-in" title="Zoom In">+</button>
        <button id="canvas-zoom-out" title="Zoom Out">−</button>
      </div>
      <!-- Wall dimension input popup -->
      <div id="wall-input-popup" class="popup" style="display:none">
        <label>Length (mm):</label>
        <input type="number" id="wall-length-input" min="1" step="10">
        <button id="wall-length-ok">OK</button>
        <button id="wall-length-cancel">Cancel</button>
      </div>
    </div>

    <!-- Right Panel -->
    <div id="right-panel">
      <h3>Furniture Library</h3>
      <div id="furniture-categories"></div>
    </div>
  </div>

  <!-- Bottom Properties Bar -->
  <div id="properties-bar">
    <div id="props-content" style="display:none">
      <div class="prop-group">
        <label>X(mm)</label><input type="number" id="prop-x" step="1">
      </div>
      <div class="prop-group">
        <label>Y(mm)</label><input type="number" id="prop-y" step="1">
      </div>
      <div class="prop-group">
        <label>W(mm)</label><input type="number" id="prop-w" step="1">
      </div>
      <div class="prop-group">
        <label>H(mm)</label><input type="number" id="prop-h" step="1">
      </div>
      <div class="prop-group">
        <label>Angle</label><input type="number" id="prop-angle" step="1" min="0" max="360">
      </div>
      <div class="prop-group">
        <button id="btn-delete" class="action-btn danger" title="Delete (Del)">Delete</button>
      </div>
      <div class="prop-group">
        <button id="btn-duplicate" class="action-btn" title="Duplicate (Ctrl+D)">Duplicate</button>
      </div>
    </div>
    <div id="props-hint">Select an object to see its properties &nbsp;|&nbsp; Pan: Shift + drag or Arrow keys &nbsp;|&nbsp; Zoom: scroll wheel</div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
